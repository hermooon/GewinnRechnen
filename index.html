<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gewinnrechner</title>

  <style>
    body {
        font-family:sans-serif;
        background-color: whitesmoke;
        margin-bottom: 50px;
        font-size: 20px;
    }

    h2 {
        text-align: center;
        margin-top: 60px;
        margin-bottom: 50px;
        font-size: 20px;
    }

    input {
        display:block;
        margin: 10px auto;
        max-width: 350px;
        padding: 12px;
        margin-bottom: 30px;
        font-size: small;
        margin-bottom: 30px;
    }

    button{
        margin-left: 150px ;
         font-size:small;
        
    }

    #result {
        margin-top: 80px;
        text-align:left;
        font-weight: bold;
        font-size: 15px;
        margin-bottom: 150px;
    }

    .dark{
        background-color:  #0a0a39;
        color:whitesmoke;
    }
  </style>
</head>

<body>

  <h2>Gewinnrechner</h2>

  <input type="number" id="a" placeholder="Gewinn (€)" />
  <input type="number" id="b" placeholder="Arbeitszeit (h)" />
  <input type="number" id="c" placeholder="Einsatz / Monat" />
  <input type="number" id="d" placeholder="Stundenlohn (€)" />

  <button onclick="Ergebnis()">Berechnen</button>


  <p id="result">Gewinn für weißen Häuptling Keilhauer: </p>

  <script>
    function Ergebnis() {
      const a = Number(document.getElementById("a").value);
      const b = Number(document.getElementById("b").value);
      const c = Number(document.getElementById("c").value);
      const d = Number(document.getElementById("d").value);

      const erg = (a * 0.75) - (d * (b * c));

      document.getElementById("result").innerText =
        "Gewinn für weißen Häuptling Keilhauer: " + erg + "€";
    }
    function reset() {
    document.getElementById("a").value = "";
    document.getElementById("b").value = "";
    document.getElementById("c").value = "";
    document.getElementById("d").value = "";
    document.getElementById("result").innerText =
      "Gewinn für weißen Häuptling Keilhauer:";
    }

    function darkMode() {
        document.body.classList.toggle("dark"); 
    }

    

  </script>
  <button onclick="darkMode()">Dark Mode</button>

  

</body>
</html>
